<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Glow effect -->
  <circle cx="96" cy="96" r="96" fill="url(#glow)"/>
  <!-- Shield shape -->
  <path d="M96 15.4 L157.4 32.6 L157.4 105.6 Q157.4 144 96 169 Q34.6 144 34.6 105.6 L34.6 32.6 Z"
        fill="none" stroke="#22d3ee" stroke-width="8" stroke-linejoin="round" opacity="0.9"/>
  <!-- DNA helix left strand -->
  <path d="M67.2 48 Q80.6 63.4 67.2 80.6 Q53.8 96 67.2 111.4 Q80.6 126.7 67.2 144"
        fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- DNA helix right strand -->
  <path d="M124.8 48 Q111.4 63.4 124.8 80.6 Q138.2 96 124.8 111.4 Q111.4 126.7 124.8 144"
        fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- DNA crossbars -->
  <line x1="67.2" y1="63.4" x2="124.8" y2="63.4" stroke="#7dd3fc" stroke-width="4.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="67.2" y1="80.6" x2="124.8" y2="80.6" stroke="#7dd3fc" stroke-width="4.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="67.2" y1="96"   x2="124.8" y2="96"   stroke="#7dd3fc" stroke-width="4.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="67.2" y1="111.4" x2="124.8" y2="111.4" stroke="#7dd3fc" stroke-width="4.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="67.2" y1="126.7" x2="124.8" y2="126.7" stroke="#7dd3fc" stroke-width="4.8" stroke-linecap="round" opacity="0.75"/>
  <!-- Center pulse dot -->
  <circle cx="96" cy="96" r="12" fill="#22d3ee" opacity="0.95"/>
  <circle cx="96" cy="96" r="6"  fill="#ffffff"  opacity="0.7"/>
</svg>
