name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          # Provide dummy values so Vite doesn't fail on missing env vars
          VITE_MAPPLS_TOKEN: dummy
          GEMINI_API_KEY: dummy
          FLOOD_ML_API: "http://localhost:8000"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flood_ml_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: flood_ml_api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_flood.db"
          CORS_ORIGINS: "http://localhost:3000"
          LOG_LEVEL: "WARNING"

  # ─── Docker build verification ───────────────────────────────────────────────
  docker:
    name: Docker Build (flood-api)
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t biosentinelx-api:ci ./flood_ml_api

      - name: Smoke-test container health endpoint
        run: |
          docker run -d --name bsx-api -p 8000:8000 \
            -e CORS_ORIGINS="http://localhost:3000" \
            -e LOG_LEVEL="WARNING" \
            biosentinelx-api:ci
          sleep 15
          curl --retry 5 --retry-delay 3 --retry-connrefused -sf http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy', d"
          docker stop bsx-api
